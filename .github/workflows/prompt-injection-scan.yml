# Prompt Injection Scan — scans artifact files (agents, skills, commands) for prompt injection patterns.
# Runs when those paths or this workflow change.

name: Prompt Injection Scan

on:
  push:
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - '.github/workflows/prompt-injection-scan.yml'
  pull_request:
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - '.github/workflows/prompt-injection-scan.yml'

concurrency:
  group: prompt-injection-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Prompt Injection Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan artifacts for prompt injection
        run: |
          npx prompt-injection-scanner \
            --format json \
            --severity HIGH \
            agents/**/*.md \
            skills/**/SKILL.md \
            skills/**/references/*.md \
            commands/**/*.md
